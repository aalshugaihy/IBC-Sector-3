# Render Blueprint — Investment & Business Services Sector Tracker
#
# This blueprint provisions ONE web service that serves both the API and
# the built React frontend. You bring your own PostgreSQL via the
# DATABASE_URL env var (Render free tier allows only ONE free DB per
# account; we keep the DB out of the blueprint so it works regardless).
#
# Compatible DB providers (any of):
#   • A Render PostgreSQL instance you already created
#   • Neon  (https://neon.tech)       — free tier, never expires
#   • Supabase (https://supabase.com) — free tier, never expires
#   • Self-hosted PostgreSQL with SSL enabled
#
# After applying this blueprint, open the new web service and paste your
# Postgres connection string into the DATABASE_URL environment variable.

services:
  - type: web
    name: ibc-sector-3
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    buildCommand: |
      npm install --include=dev
      cd server && npm install --include=dev
      cd ..
      npm run build
      cd server && npm run build && cp src/schema.sql dist/schema.sql
    startCommand: cd server && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SERVE_STATIC
        value: "true"
      - key: PGSSL
        value: "true"
      # Required — paste your Postgres connection string here after deploy.
      # Format: postgresql://USER:PASS@HOST:PORT/DBNAME
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      # Optional. Can also be added later from the in-app Settings page
      # (admin → Settings → Integration keys) without a redeploy.
      - key: GEMINI_API_KEY
        sync: false
      # Optional first-admin auto-create. Set both to seed the admin on
      # first boot when the users table is empty.
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
